    '<div class="stat"><div class="v '+(cg>=0?'price-up':'price-dn')+'">'+cg.toFixed(1)+'%</div><div class="l">Price</div></div>'+
    '<div class="stat"><div class="v '+(cg>=0?'price-up':'price-dn')+'">'+(cg*lev).toFixed(1)+'%</div><div class="l">x'+lev.toFixed(1)+'</div></div>'+
    '<div class="stat"><div class="v">'+fmt(hi,CURRENT)+'</div><div class="l">High</div></div>'+
    '<div class="stat"><div class="v">'+fmt(lo,CURRENT)+'</div><div class="l">Low</div></div>'+
    '<div class="stat"><div class="v" style="color:#d29922">'+ns+'</div><div class="l">Sig</div></div>'+
    '<div class="stat"><div class="v" style="color:'+(wr>=60?'#3fb950':'#f85149')+'">'+wr+'%</div><div class="l">WR</div></div>'+
    '<div class="stat"><div class="v">'+cc.length+'</div><div class="l">Days</div></div>';
  drawChart(document.getElementById('chart'),vw,{height:420,title:(NAMES[CURRENT]||CURRENT)+' ['+PERIOD+'] GO'+GO_PCT+'% x'+lev.toFixed(1),fmt:function(v){return fmt(v,CURRENT)}});

  var tbl=document.getElementById('sigtable');

  for(var i=0;i<vw.sx.length;i++){
    var pnl=((vw.ey[i]-vw.sy[i])/vw.sy[i]*100),lp=pnl*lev,dir=vw.sdir[i]||'LONG',c1=dir==='LONG'?'#3fb950':'#f85149',w=vw.sw[i];
    if(FILTER!=='all'&&(FILTER==='win')!==w)continue;
    var rc=' class="'+(w?'win':'loss')+'-row"';
    htm+='<tr'+rc+'><td>'+vw.sx[i]+'</td><td style="color:'+c1+'">'+dir+'</td><td class="num">'+fmt(vw.sy[i],CURRENT)+'</td><td class="num">'+fmt(vw.ey[i],CURRENT)+'</td><td class="num '+(pnl>=0?'win':'loss')+'">'+(pnl>=0?'+':'')+pnl.toFixed(2)+'%</td><td class="num '+(lp>=0?'win':'loss')+'">'+(lp>=0?'+':'')+lp.toFixed(1)+'%</td><td class="'+(w?'win':'loss')+'">'+(w?'WIN':'LOSS')+'</td></tr>'}
  tbl.innerHTML=htm;document.getElementById('sig-title').textContent=CURRENT+' GO'+GO_PCT+'%'}
