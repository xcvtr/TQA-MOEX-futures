var TICKERS = ['Si','BR','NG','GD'];
var CURRENT = 'Si';
var PERIOD = 'all';
var LEVERAGE = 1;

function fmt(v,s){return s==='Si'||s==='GD'?v.toFixed(0):v.toFixed(2)}

function getView(d){
  var p=PERIOD;
  if(p==='all'||!d||!d.dates)return d;
  var n=Math.min(parseInt(p),d.dates.length);
  var s=d.dates.length-n;
  return {
    dates:d.dates.slice(s),o:d.o.slice(s),h:d.h.slice(s),
    l:d.l.slice(s),c:d.c.slice(s),v:d.v.slice(s),
    sx:d.sx.filter(function(x){return d.dates.indexOf(x)>=s}),
    sy:d.sy.filter(function(x,i){return d.dates.indexOf(d.sx[i])>=s}),
    sw:d.sw.filter(function(x,i){return d.dates.indexOf(d.sx[i])>=s}),
    ex:d.ex.filter(function(x,i){return d.dates.indexOf(d.sx[i])>=s}),
    ey:d.ey.filter(function(x,i){return d.dates.indexOf(d.sx[i])>=s}),n:d.n
  };
}

function setPeriod(p){PERIOD=p;document.querySelectorAll('.zb').forEach(function(b){b.className=b.dataset.d===p?'zb active':'zb'});renderAll()}
function setLever(l){LEVERAGE=l;document.querySelectorAll('.lev-btn').forEach(function(b){b.className=b.dataset.lev==l?'lev-btn active':'lev-btn'});renderAll()}

function drawChart(c,d,o){
  var W=c.width=c.parentElement.clientWidth-4||900,H=c.height=parseInt(o.height||420),cx=c.getContext('2d');
  cx.clearRect(0,0,W,H);
  var dt=d.dates,op=d.o,hi=d.h,lo=d.l,cl=d.c;
  if(!dt||!dt.length){cx.fillStyle='#8b949e';cx.font='13px system-ui';cx.textAlign='center';cx.fillText('No data',W/2,H/2);return}
  var N=dt.length,pa={top:24,right:24,bottom:32,left:65},iw=W-pa.left-pa.right,ih=H-pa.top-pa.bottom;
  var mn=Math.min.apply(null,lo),mx=Math.max.apply(null,hi),rg=mx-mn||1,pr=rg*0.05,ymn=mn-pr,ymx=mx+pr,yr=ymx-ymn;
  function xp(i){return pa.left+(i/Math.max(N-1,1))*iw}
  function yp(v){return pa.top+ih-((v-ymn)/yr)*ih}
  var cw=Math.max(1,Math.min(10,iw/N*0.6));
  cx.strokeStyle='#1a1a1a';cx.lineWidth=.5;
  for(var i=0;i<=5;i++){var yy=pa.top+(i/5)*ih;cx.beginPath();cx.moveTo(pa.left,yy);cx.lineTo(W-pa.right,yy);cx.stroke()}
  cx.fillStyle='#484f58';cx.font='10px system-ui';cx.textAlign='right';
  for(var i=0;i<=5;i++){var vv=ymx-(i/5)*yr;cx.fillText(o.fmt?o.fmt(vv):vv.toFixed(2),pa.left-6,pa.top+(i/5)*ih+3)}
  cx.textAlign='center';
  for(var i=0;i<N;i+=Math.max(1,Math.floor((N-1)/7))){cx.fillText(dt[i].length>7?dt[i].slice(5):dt[i],xp(i),H-8)}
  for(var i=0;i<N;i++){
    var xx=xp(i),up=cl[i]>=op[i],co=up?'#3fb950':'#f85149',tp=up?cl[i]:op[i],bt=up?op[i]:cl[i];
    cx.fillStyle=co;cx.fillRect(xx-cw/2,yp(tp),cw,Math.max(1,yp(bt)-yp(tp)));
    cx.strokeStyle=co;cx.lineWidth=.8;cx.beginPath();cx.moveTo(xx,yp(hi[i]));cx.lineTo(xx,yp(lo[i]));cx.stroke()
  }
  var sx=d.sx||[],sy=d.sy||[],ex=d.ex||[],ey=d.ey||[];
  for(var s=0;s<sx.length;s++){
    var ei=dt.indexOf(sx[s]),xi=dt.indexOf(ex[s]);
    if(ei<0||xi<0)continue;
    var x1=xp(ei),y1=yp(sy[s]),x2=xp(xi),y2=yp(ey[s]);
    cx.strokeStyle='#00ff66';cx.lineWidth=6;cx.setLineDash([]);
    cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();
    cx.fillStyle='#00ff88';cx.beginPath();cx.arc(x2,y2,12,0,Math.PI*2);cx.fill()
  }
  for(var s=0;s<sx.length;s++){
    var ei=dt.indexOf(sx[s]);if(ei<0)continue;
    var xx=xp(ei),yy=yp(sy[s]),sz=7;
    cx.fillStyle=d.sw[s]?'#3fb950':'#f85149';cx.strokeStyle='#0d1117';cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(xx,yy-sz-3);cx.lineTo(xx-sz,yy+2);cx.lineTo(xx+sz,yy+2);cx.closePath();cx.fill();cx.stroke()
  }
  if(o.title){cx.fillStyle='#8b949e';cx.font='11px system-ui';cx.textAlign='left';cx.fillText(o.title,pa.left,14)}
}

function drawVol(c,d){
  var W=c.width=c.parentElement.clientWidth-4||900,H=c.height=70,cx=c.getContext('2d');cx.clearRect(0,0,W,H);
  var v=d.v||[];if(!v.length)return;
  var pa={top:4,left:65,right:24,bottom:10},iw=W-pa.left-pa.right,ih=H-pa.top-pa.bottom;
  var mv=Math.max.apply(null,v),N=v.length;
  function xx(i){return pa.left+(i/Math.max(N-1,1))*iw}
  var cw=Math.max(1,Math.min(10,iw/N*0.6)),c2=d.c||[],op=d.o||[];
  for(var i=0;i<N;i++){cx.fillStyle=(c2[i]>=op[i]?'#3fb950':'#f85149');cx.globalAlpha=.35;cx.fillRect(xx(i)-cw/2,pa.top+ih-(v[i]/mv)*ih,cw,(v[i]/mv)*ih)}
  cx.globalAlpha=1
}

function renderAll(){
  var el=document.getElementById('tabs');el.innerHTML='';
  for(var ti=0;ti<TICKERS.length;ti++){
    var s=TICKERS[ti],d=DATA[s],n=d.sx.length,w=0;
    for(var wi=0;wi<d.sw.length;wi++)w+=d.sw[wi];
    var wr=n?Math.round(w/n*100):0,tb=document.createElement('div');
    tb.className='tab'+(s===CURRENT?' active':'');tb.dataset.sym=s;
    tb.innerHTML=s+'<span class="sm">'+n+'/'+wr+'%</span>';
    tb.addEventListener('click',function(e){selectTicker(e.currentTarget.dataset.sym)});el.appendChild(tb)
  }
  var vw=getView(DATA[CURRENT]),dd=DATA[CURRENT],cc=vw.c,lc=cc[cc.length-1],fr=vw.o[0];
  var cg=((lc-fr)/fr*100);
  var hi=Math.max.apply(null,vw.h),lo=Math.min.apply(null,vw.l),ns=vw.sx.length,nw=0;
  for(var wi=0;wi<vw.sw.length;wi++)nw+=vw.sw[wi];
  var wr=ns?Math.round(nw/ns*100):0;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="v '+(cg>=0?'price-up':'price-dn')+'">'+fmt(lc,CURRENT)+'</div><div class="l">Last</div></div>'+
    '<div class="stat"><div class="v '+(cg>=0?'price-up':'price-dn')+'">'+cg.toFixed(1)+'%</div><div class="l">Chg</div></div>'+
    '<div class="stat"><div class="v '+(cg>=0?'price-up':'price-dn')+'">'+(cg*LEVERAGE).toFixed(1)+'%</div><div class="l">x'+LEVERAGE+'</div></div>'+
    '<div class="stat"><div class="v">'+fmt(hi,CURRENT)+'</div><div class="l">High</div></div>'+
    '<div class="stat"><div class="v">'+fmt(lo,CURRENT)+'</div><div class="l">Low</div></div>'+
    '<div class="stat"><div class="v" style="color:#d29922">'+ns+'</div><div class="l">Sig</div></div>'+
    '<div class="stat"><div class="v" style="color:'+(wr>=65?'#3fb950':'#f85149')+'">'+wr+'%</div><div class="l">WR</div></div>'+
    '<div class="stat"><div class="v">'+cc.length+'</div><div class="l">Days</div></div>';
  drawChart(document.getElementById('chart'),vw,{height:420,title:(vw.n||CURRENT)+' ['+PERIOD+'] x'+LEVERAGE,fmt:function(v){return fmt(v,CURRENT)}});
  drawVol(document.getElementById('vol_chart'),vw);
  var tbl=document.getElementById('sigtable');
  var htm='<tr><th>Date</th><th> Entry</th><th> Exit</th><th> PnL</th><th> x'+LEVERAGE+'</th><th>Result</th></tr>';
  for(var i=0;i<vw.sx.length;i++){
    var pnl=((vw.ey[i]-vw.sy[i])/vw.sy[i]*100);
    var levPnL=pnl*LEVERAGE;
    htm+='<tr><td>'+vw.sx[i]+'</td><td class="num">'+fmt(vw.sy[i],CURRENT)+'</td><td class="num">'+fmt(vw.ey[i],CURRENT)+'</td><td class="num '+(pnl>=0?'win':'loss')+'">'+(pnl>=0?'+':'')+pnl.toFixed(2)+'%</td><td class="num '+(levPnL>=0?'win':'loss')+'">'+(levPnL>=0?'+':'')+levPnL.toFixed(1)+'%</td><td class="'+(vw.sw[i]?'win':'loss')+'">'+(vw.sw[i]?'WIN':'LOSS')+'</td></tr>'
  }
  tbl.innerHTML=htm;document.getElementById('sig-title').textContent=CURRENT+' x'+LEVERAGE
}

function selectTicker(sym){
  CURRENT=sym;
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++)tabs[i].classList.toggle('active',tabs[i].dataset.sym===sym);
  renderAll()
}

document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.zb').forEach(function(b){b.addEventListener('click',function(e){setPeriod(e.currentTarget.dataset.d)})});
  document.querySelectorAll('.lev-btn').forEach(function(b){b.addEventListener('click',function(e){setLever(parseInt(e.currentTarget.dataset.lev))})});
  renderAll()
});
window.addEventListener('resize',renderAll);
