<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui,sans-serif;padding:20px;max-width:1200px;margin:0 auto}
h1{color:#58a6ff;font-size:24px}

// ═══════════════════════════════════ CANVAS CHARTING ══════════════════════════
function drawLineChart(canvas, data, opts) {
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = canvas.width = rect.width - 4 || 800;
  const H = canvas.height = parseInt(canvas.height) || 300;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const pad = {top:20, right:20, bottom:36, left:55};
  const iw = W - pad.left - pad.right;
  const ih = H - pad.top - pad.bottom;

  if (!data || data.length === 0) {
    ctx.fillStyle = '#8b949e'; ctx.font = '13px system-ui';
    ctx.textAlign = 'center'; ctx.fillText('No data', W/2, H/2);
    return;
  }

  const vals = data.map(d => d.y);
  const min = opts.ymin !== undefined ? opts.ymin : Math.min(...vals);
  const max = opts.ymax !== undefined ? opts.ymax : Math.max(...vals);
  const range = max - min || 1;

  function xPos(i) { return pad.left + (i / (data.length-1 || 1)) * iw; }
  function yPos(v) { return pad.top + ih - ((v - min) / range) * ih; }

  // Grid
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const yy = pad.top + (i/4) * ih;
    ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(W-pad.right, yy); ctx.stroke();
  }

  // Y labels
  ctx.fillStyle = '#484f58'; ctx.font = '10px system-ui'; ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const v = max - (i/4)*range;
    const yy = pad.top + (i/4)*ih;
    const label = opts.fmt ? opts.fmt(v) : (v < 1 ? v.toFixed(3) : v < 100 ? v.toFixed(2) : v.toFixed(0));
    ctx.fillText(label, pad.left-6, yy+3);
  }

  // X labels
  ctx.fillStyle = '#484f58'; ctx.textAlign = 'center';
  const nLabels = Math.min(6, data.length);
  const step = Math.max(1, Math.floor((data.length-1) / (nLabels-1)));
  for (let i = 0; i < data.length; i += step) {
    const xx = xPos(i);
    const label = data[i].x;
    ctx.fillText(label.length > 7 ? label.slice(5) : label, xx, H-8);
  }

  // X axis label
  if (opts.xlabel) { ctx.fillStyle = '#484f58'; ctx.font = '9px system-ui'; ctx.fillText(opts.xlabel, pad.left + iw/2, H-8); }

  // Line
  ctx.strokeStyle = opts.color || '#c9d1d9';
  ctx.lineWidth = opts.lineWidth || 1.5;
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const xx = xPos(i), yy = yPos(data[i].y);
    i === 0 ? ctx.moveTo(xx, yy) : ctx.lineTo(xx, yy);
  }
  ctx.stroke();

  // Fill
  if (opts.fill) {
    const last = data.length-1;
    ctx.lineTo(xPos(last), yPos(min));
    ctx.lineTo(xPos(0), yPos(min));
    ctx.closePath();
    ctx.fillStyle = opts.fill; ctx.fill();
  }

  // Markers
  if (opts.markers) {
    opts.markers.forEach(m => {
      const idx = data.findIndex(d => d.x === m.x);
      if (idx < 0) return;
      const cx = xPos(idx), cy = yPos(m.y);
      ctx.fillStyle = m.win ? '#3fb950' : '#f85149';
      ctx.beginPath();
      if (m.win) {
        // Up triangle
        ctx.moveTo(cx, cy-8); ctx.lineTo(cx-6, cy+4); ctx.lineTo(cx+6, cy+4);
      } else {
        // Down triangle
        ctx.moveTo(cx, cy+8); ctx.lineTo(cx-6, cy-4); ctx.lineTo(cx+6, cy-4);
      }
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
    });
  }

  // Title
  if (opts.title) {
    ctx.fillStyle = '#8b949e'; ctx.font = '11px system-ui'; ctx.textAlign = 'left';
    ctx.fillText(opts.title, pad.left, 14);
  }
}

const TICKERS = ['Si','BR','NG','GD'];
let CURRENT = 'Si';

function fmtPrice(v, sym) { return sym==='Si'||sym==='GD' ? v.toFixed(0) : v.toFixed(2); }

function selectTicker(sym) {
  CURRENT = sym;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.sym === sym));
  drawAll();
}

function drawTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  TICKERS.forEach(sym => {
    const d = DATA[sym];
    const n = d.signals.x.length;
    const w = d.signals.w.reduce((a,b)=>a+b,0);
    const wr = Math.round(w/n*100);
    const tab = document.createElement('div');
    tab.className = 'tab' + (sym===CURRENT?' active':'');
    tab.dataset.sym = sym;
    tab.innerHTML = `${sym}<span class="sm">${n} sig · ${wr}% WR</span>`;
    tab.onclick = () => selectTicker(sym);
    el.appendChild(tab);
  });
}

function drawStats() {
  const d = DATA[CURRENT];
  const p = d.prices;
  const last = p[p.length-1], first = p[0];
  const chg = ((last-first)/first*100).toFixed(1);
  const nSig = d.signals.x.length;
  const nWin = d.signals.w.reduce((a,b)=>a+b,0);
  const wr = Math.round(nWin/nSig*100);
  const hi = Math.max(...p), lo = Math.min(...p);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="v ${chg>=0?'price-up':'price-dn'}">${fmtPrice(last,CURRENT)}</div><div class="l">Current</div></div>
    <div class="stat"><div class="v ${chg>=0?'price-up':'price-dn'}">${chg}%</div><div class="l">Total Change</div></div>
    <div class="stat"><div class="v">${fmtPrice(hi,CURRENT)}</div><div class="l">High</div></div>
    <div class="stat"><div class="v">${fmtPrice(lo,CURRENT)}</div><div class="l">Low</div></div>
    <div class="stat"><div class="v" style="color:#d29922">${nSig}</div><div class="l">Signals</div></div>
    <div class="stat"><div class="v" style="color:${wr>=65?'#3fb950':'#f85149'}">${wr}%</div><div class="l">Winrate</div></div>`;
}

function drawCharts() {
  const d = DATA[CURRENT];
  const dates = d.dates, prices = d.prices;
  const sigs = d.signals;

  // Price chart
  const priceData = dates.map((x,i) => ({x, y: prices[i]}));
  const markers = sigs.x.map((x,i) => ({x, y: sigs.y[i], win: sigs.w[i]}));
  drawLineChart(document.getElementById('chart'), priceData, {
    color: '#c9d1d9', lineWidth: 1.5, title: `${d.name}`,
    fmt: v => fmtPrice(v, CURRENT),
    markers: markers, fill: 'rgba(201,209,217,0.04)'
  });

  // Equity chart
  const eq = d.equity;
  const eqData = eq.x.map((x,i) => ({x, y: eq.y[i]}));
  const eqColor = eq.y[eq.y.length-1] >= 0 ? '#3fb950' : '#f85149';
  drawLineChart(document.getElementById('equity_chart'), eqData, {
    color: '#d29922', lineWidth: 2,
    fmt: v => (v*100).toFixed(1)+'%',
    fill: 'rgba(210,153,34,0.08)',
    ymin: Math.min(...eq.y,-0.05), ymax: Math.max(...eq.y,0.05)
  });

  // OI chart
  if (CURRENT === 'Si') {
    const oiData = OI_DATES.map((x,i) => ({x, y: OI_SI_FIZ[i]}));
    drawLineChart(document.getElementById('oi_chart'), oiData, {
      color: '#58a6ff', lineWidth: 1, fmt: v => (v/1000).toFixed(0)+'K'
    });
  } else {
    const ctx = document.getElementById('oi_chart').getContext('2d');
    const W = ctx.canvas.width = 800;
    const H = ctx.canvas.height = 180;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#484f58'; ctx.font = '13px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('OI data available for Si only', W/2, H/2);
  }
}

function drawTradeLog() {
  const d = DATA[CURRENT];
  const el = document.getElementById('tradelog');
  let html = '<tr><th>Date</th><th>Dir</th><th>Entry</th><th>Ret 5d</th><th>Ret 10d</th><th>Patterns</th><th>Result</th></tr>';
  (d.trades.length ? d.trades : []).forEach(t => {
    html += `<tr><td>${t.d}</td><td>${t.dir}</td><td class="num">${fmtPrice(t.e,CURRENT)}</td>
      <td class="num ${t.r5.startsWith('+')?'win':'loss'}">${t.r5}</td>
      <td class="num ${t.r10.startsWith('+')?'win':'loss'}">${t.r10}</td>
      <td style="font-size:0.85em">${t.p}</td>
      <td class="${t.w?'win':'loss'}">${t.w?'✅':'❌'}</td></tr>`;
  });
  el.innerHTML = html;
}

function drawAll() {
  drawTabs();
  drawStats();
  drawCharts();
  drawTradeLog();
}

document.addEventListener('DOMContentLoaded', drawAll);
window.addEventListener('resize', drawAll);
</script>
