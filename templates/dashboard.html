<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOEX Manipulation Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f5f7fa;color:#333;}
.header{background:linear-gradient(135deg,#1a237e,#0d47a1);color:white;padding:16px 24px;display:flex;align-items:center;gap:24px;}
.header h1{font-size:20px;font-weight:600;}
.controls{display:flex;gap:12px;align-items:center;margin-left:auto;}
.controls select,.controls input,.controls button{padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:white;font-size:13px;}
.controls button{cursor:pointer;background:rgba(255,255,255,0.25);}
.controls option{color:#333;background:white;}
.stats{display:flex;gap:12px;padding:8px 24px;background:white;border-bottom:1px solid #e0e0e0;font-size:13px;flex-wrap:wrap;}
.stat{display:flex;gap:4px;}
.stat-label{color:#888;}
.stat-value{font-weight:600;}
.chart-container{margin:12px 24px;background:white;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.08);padding:12px;}
.chart-container h3{font-size:14px;color:#555;margin-bottom:8px;padding-left:4px;}
canvas{width:100% !important;max-height:350px;}
.patterns-table{margin:0 24px 24px;background:white;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.08);overflow-x:auto;}
.patterns-table table{width:100%;border-collapse:collapse;font-size:12px;}
.patterns-table th{background:#f0f4ff;padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid #e0e0e0;white-space:nowrap;}
.patterns-table td{padding:6px 10px;border-bottom:1px solid #f0f0f0;}
.patterns-table tr:hover{background:#fafbff;}
.bull{color:#26a69a;font-weight:600;}
.bear{color:#ef5350;font-weight:600;}
.success{color:#26a69a;}
.fail{color:#ef5350;}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;}
.tag-flow_divergence{background:#e3f2fd;color:#1565c0;}
.tag-flow_extreme{background:#fce4ec;color:#c62828;}
.tag-oi_extreme{background:#fff3e0;color:#e65100;}
.tag-oi_trap{background:#e8f5e9;color:#2e7d32;}
.tag-oi_divergence{background:#f3e5f5;color:#6a1b9a;}
.tag-false_break{background:#fff8e1;color:#f57f17;}
.tag-stop_hunt{background:#ffebee;color:#b71c1c;}
.tag-vol_climax{background:#e0f7fa;color:#00695c;}
@media(max-width:768px){.header{flex-wrap:wrap;}.controls{margin-left:0;width:100%;}}
</style>
</head>
<body>
<div class="header">
  <h1>MOEX Manipulation Dashboard</h1>
  <div class="controls">
    <select id="symbolSelect">__SYMBOL_OPTIONS__</select>
    <select id="daysSelect">__DAYS_OPTIONS__</select>
    <button onclick="loadData()">Обновить</button>
  </div>
</div>
<div class="stats" id="stats">__STATS__</div>
<div class="chart-container"><h3>📈 Цена + паттерны</h3><canvas id="priceChart"></canvas></div>
<div class="chart-container"><h3>📊 OI Физлица</h3><canvas id="fizChart"></canvas></div>
<div class="chart-container"><h3>📊 OI Юрлица</h3><canvas id="yurChart"></canvas></div>
<div class="chart-container"><h3>📉 Flow z-score</h3><canvas id="zscoreChart"></canvas></div>
<div class="chart-container"><h3>💰 Equity (10k RUB, 1 lot Si)</h3><canvas id="equityChart"></canvas></div>
<div class="patterns-table" id="patternsTable">__TABLE__</div>
<script id="chartData" type="application/json">__CHART_DATA__</script>
<script>
const API_BASE = '';
let charts = {};

function loadData() {
  const sym = document.getElementById('symbolSelect').value;
  const days = document.getElementById('daysSelect').value;
  window.location.href = '?symbol=' + sym + '&days=' + days;
}

function initChart(id, labels, datasets, opts) {
  if (charts[id]) { charts[id].destroy(); }
  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, {
    type: 'line',
    data: { labels: labels, datasets: datasets },
    options: Object.assign({
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 10 } } }
      },
      scales: {
        x: {
          type: 'category',
          grid: { display: false },
          ticks: { maxTicksLimit: 60, maxRotation: 0 }
        },
        y: { grid: { color: '#f0f0f0' } }
      }
    }, opts || {})
  });
}

function initCharts(data) {
  const p = data.barData;
  const total = p.close.length;

  // Downsample: take ~500 evenly spaced points
  function downsample(arr, n) {
    if (arr.length <= n) return arr;
    const step = Math.floor(arr.length / n);
    const result = [];
    for (let i = 0; i < arr.length; i += step) result.push(arr[i]);
    // ensure last point is included
    if (result[result.length - 1] !== arr[arr.length - 1]) result.push(arr[arr.length - 1]);
    return result;
  }

  const ds = 500;
  const tlabels = p.time_ts.map(function(t) {
    const d = new Date(t * 1000);
    return (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  });

  function chartData(labels, vals) {
    const sliced = downsample(labels, ds);
    const step = Math.floor(labels.length / sliced.length);
    return {
      labels: sliced,
      data: downsample(vals, ds),
      step: Math.max(1, step)
    };
  }

  // ── Price chart with pattern overlays ──
  const cd = chartData(tlabels, p.close);

  // Build array of downsampled timestamps for nearest-match lookup
  const step = Math.max(1, Math.floor(p.time_ts.length / cd.labels.length));
  const dsTimestamps = [];
  for (let i = 0; i < p.time_ts.length; i += step) {
    dsTimestamps.push(p.time_ts[i]);
  }
  if (dsTimestamps[dsTimestamps.length - 1] !== p.time_ts[p.time_ts.length - 1]) {
    dsTimestamps.push(p.time_ts[p.time_ts.length - 1]);
  }

  // Find nearest downsampled index for a given time (seconds since epoch)
  function nearestIdx(secs) {
    let lo = 0, hi = dsTimestamps.length - 1;
    while (lo < hi) {
      const mid = (lo + hi) >>> 1;
      if (dsTimestamps[mid] < secs) lo = mid + 1;
      else hi = mid;
    }
    // Check neighbors
    let best = lo;
    for (let d = -2; d <= 2; d++) {
      const j = lo + d;
      if (j >= 0 && j < dsTimestamps.length) {
        if (Math.abs(dsTimestamps[j] - secs) < Math.abs(dsTimestamps[best] - secs)) {
          best = j;
        }
      }
    }
    return (Math.abs(dsTimestamps[best] - secs) <= 600) ? Math.min(best, cd.labels.length - 1) : -1;
  }

  // Resolve pattern ISO time to seconds
  function resolveTime(t) {
    const dt = new Date(t + 'Z');
    return Math.floor(dt.getTime() / 1000 / 300) * 300;
  }

  // Group patterns by type, find their positions in downsampled data
  const patColors = {
    'OI_TRAP': { bull: '#2e7d32', bear: '#c62828' },
    'VOL_CLIMAX': { bull: '#00695c', bear: '#b71c1c' },
    'FLOW_DIVERGENCE': { bull: '#1565c0', bear: '#e65100' },
    'FLOW_EXTREME': { bull: '#283593', bear: '#bf360c' },
    'STOP_HUNT': { bull: '#4a148c', bear: '#4a148c' },
    'FALSE_BREAK': { bull: '#f57f17', bear: '#f57f17' },
    'OI_EXTREME': { bull: '#2e7d32', bear: '#c62828' },
  };
  const patShapes = {
    'OI_TRAP': 'triangle',
    'VOL_CLIMAX': 'circle',
    'FLOW_DIVERGENCE': 'diamond',
    'FLOW_EXTREME': 'rect',
    'STOP_HUNT': 'cross',
    'FALSE_BREAK': 'rectRot',
    'OI_EXTREME': 'star',
  };

  // Build overlay datasets per pattern type + direction
  const overlaySets = {};
  if (data.patterns) {
    for (const pat of data.patterns) {
      const secs = resolveTime(pat.time);
      const idx = nearestIdx(secs);
      if (idx < 0) continue;
      const dir = pat.direction || 'NEUTRAL';
      const key = pat.type + '_' + dir;
      if (!overlaySets[key]) {
        const c = patColors[pat.type] || { bull: '#666', bear: '#666' };
        const color = c[dir.toLowerCase()] || '#666';
        overlaySets[key] = {
          label: pat.type + (dir !== 'NEUTRAL' ? ' ' + dir : ''),
          data: new Array(cd.labels.length).fill(null),
          borderColor: color,
          backgroundColor: color,
          pointStyle: patShapes[pat.type] || 'circle',
          pointRadius: 6,
          pointHoverRadius: 8,
          showLine: false,
          order: 0,
        };
      }
      overlaySets[key].data[idx] = pat.entry_price || 0;
    }
  }

  const priceDatasets = [
    { label: 'Close', data: cd.data, borderColor: '#1565c0',
      backgroundColor: 'rgba(21,101,192,0.06)', fill: true, pointRadius: 0, borderWidth: 1.5, order: 1 },
    ...Object.values(overlaySets),
  ];

  const tickOpts = {
    x: {
      ticks: {
        maxTicksLimit: 40,
        maxRotation: 0,
        autoSkip: true
      }
    }
  };

  initChart('priceChart', cd.labels, priceDatasets, tickOpts);

  function initWith(labels, vals) {
    const sliced = downsample(labels, 200);
    const step2 = Math.floor(labels.length / sliced.length);
    return { labels: sliced, data: downsample(vals, 200) };
  }

  if (p.fiz_net) {
    const ff = initWith(tlabels, p.fiz_net);
    initChart('fizChart', ff.labels, [
      { label: 'FIZ net', data: ff.data, borderColor: '#1a73e8', backgroundColor: 'rgba(26,115,232,0.08)', fill: true, pointRadius: 0, borderWidth: 1.5 },
      { label: 'FIZ buy', data: downsample(p.fiz_buy, 200), borderColor: '#1a73e8', borderDash: [3, 3], pointRadius: 0, borderWidth: 0.8 },
      { label: 'FIZ sell', data: downsample(p.fiz_sell, 200), borderColor: '#1a73e8', borderDash: [1, 3], pointRadius: 0, borderWidth: 0.8 }
    ]);
  } else {
    document.getElementById('fizChart').parentElement.style.display = 'none';
  }

  if (p.yur_net) {
    const yy = initWith(tlabels, p.yur_net);
    initChart('yurChart', yy.labels, [
      { label: 'YUR net', data: yy.data, borderColor: '#e8710a', backgroundColor: 'rgba(232,113,10,0.08)', fill: true, pointRadius: 0, borderWidth: 1.5 },
      { label: 'YUR buy', data: downsample(p.yur_buy, 200), borderColor: '#e8710a', borderDash: [3, 3], pointRadius: 0, borderWidth: 0.8 },
      { label: 'YUR sell', data: downsample(p.yur_sell, 200), borderColor: '#e8710a', borderDash: [1, 3], pointRadius: 0, borderWidth: 0.8 }
    ]);
  } else {
    document.getElementById('yurChart').parentElement.style.display = 'none';
  }

  if (p.fiz_flow_zscore) {
    const zz = initWith(tlabels, p.fiz_flow_zscore);
    initChart('zscoreChart', zz.labels, [
      { label: 'FIZ flow z', data: zz.data, borderColor: '#1a73e8', pointRadius: 0, borderWidth: 1 },
      { label: 'YUR flow z', data: downsample(p.yur_flow_zscore, 200), borderColor: '#e8710a', pointRadius: 0, borderWidth: 1 }
    ]);
  } else {
    document.getElementById('zscoreChart').parentElement.style.display = 'none';
  }

  // ── Equity curve ──
  if (data.equity && data.equity.length > 0) {
    const eq = data.equity;
    const eqLabels = [];
    const eqData = [];
    const eqColors = [];
    for (var i = 0; i < eq.length; i++) {
      const dt = new Date(eq[i].time + (eq[i].time.includes('Z') ? '' : 'Z'));
      eqLabels.push((dt.getMonth()+1)+'/'+dt.getDate()+' '+dt.getHours()+':'+String(dt.getMinutes()).padStart(2,'0'));
      eqData.push(eq[i].equity);
      eqColors.push(eq[i].pnl >= 0 ? 'rgba(38,166,154,0.4)' : 'rgba(239,83,80,0.4)');
    }
    // Add sentinel: prepend initial capital before first trade
    if (eq.length > 0) {
      eqLabels.unshift(eqLabels[0]);
      eqData.unshift(10000);
      eqColors.unshift('rgba(150,150,150,0.3)');
    }

    if (charts['equityChart']) { charts['equityChart'].destroy(); }
    const ctx = document.getElementById('equityChart').getContext('2d');
    charts['equityChart'] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: eqLabels,
        datasets: [{
          label: 'Equity',
          data: eqData,
          borderColor: '#1565c0',
          backgroundColor: 'rgba(21,101,192,0.08)',
          fill: true,
          pointRadius: 2,
          pointBackgroundColor: eqColors,
          borderWidth: 2,
          tension: 0.1
        }, {
          label: 'Start',
          data: new Array(eqLabels.length).fill(10000),
          borderColor: '#999',
          borderDash: [4, 4],
          pointRadius: 0,
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 10 } } }
        },
        scales: {
          x: { type: 'category', grid: { display: false }, ticks: { maxTicksLimit: 30, maxRotation: 0, autoSkip: true } },
          y: { grid: { color: '#f0f0f0' } }
        }
      }
    });
    // Update stats bar with equity summary
    const s = data.equitySummary;
    const pnlColor = s.totalPnl >= 0 ? '#26a69a' : '#ef5350';
    const pnlSign = s.totalPnl >= 0 ? '+' : '';
    const eqStats = document.createElement('div');
    eqStats.className = 'stat';
    eqStats.innerHTML = '<span class="stat-label">Equity:</span><span class="stat-value">' + s.final + ' RUB</span>'
      + ' <span style="color:' + pnlColor + ';font-weight:600;">(' + pnlSign + s.totalPnl + ' RUB)</span>'
      + ' <span class="stat-label">Trades:</span><span class="stat-value">' + s.nTrades + '</span>'
      + ' <span class="stat-label">WR:</span><span class="stat-value">' + s.winRate + '%</span>';
    document.getElementById('stats').appendChild(eqStats);
  } else {
    document.getElementById('equityChart').parentElement.style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  const dataEl = document.getElementById('chartData');
  if (dataEl && dataEl.textContent.length > 10) {
    try {
      const data = JSON.parse(dataEl.textContent);
      initCharts(data);
    } catch(e) {
      console.error('Chart init error:', e.message, e.stack);
    }
  }
});
</script>
</body>
</html>
