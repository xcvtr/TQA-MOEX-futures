<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOEX Dashboard v2</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
header { background: #16213e; padding: 12px 24px; display: flex; align-items: center; gap: 32px; border-bottom: 1px solid #0f3460; }
header h1 { font-size: 18px; color: #e94560; white-space: nowrap; }
header h1 span { color: #888; font-size: 12px; margin-left: 8px; }
nav { display: flex; gap: 4px; }
.tab { background: none; border: none; color: #888; padding: 8px 16px; cursor: pointer; font-size: 14px; border-radius: 4px 4px 0 0; transition: all .2s; }
.tab:hover { color: #e0e0e0; background: #0f3460; }
.tab.active { color: #fff; background: #1a1a2e; border-bottom: 2px solid #e94560; }
main { padding: 16px 24px; display: none; }
main.active { display: block; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.col { flex: 1; min-width: 300px; }
.card { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 16px; border: 1px solid #0f3460; }
.card h3 { color: #e94560; font-size: 14px; margin-bottom: 12px; }
select, input, button { background: #0f3460; color: #e0e0e0; border: 1px solid #1a1a2e; padding: 6px 12px; border-radius: 4px; font-size: 13px; }
select { min-width: 120px; }
button.primary { background: #e94560; color: #fff; border: none; padding: 8px 20px; cursor: pointer; font-weight: 600; }
button.primary:hover { background: #d63850; }
button.primary:disabled { opacity: .5; cursor: not-allowed; }
label { font-size: 12px; color: #888; margin-right: 6px; }
.controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #0f3460; color: #e94560; padding: 8px 10px; text-align: left; font-weight: 600; }
td { padding: 6px 10px; border-bottom: 1px solid #0f3460; }
tr:hover td { background: #0f346055; }
.pos-long { color: #00c853; font-weight: 600; }
.pos-short { color: #ff5252; font-weight: 600; }
.metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.metric { background: #0f3460; border-radius: 6px; padding: 12px; text-align: center; }
.metric .value { font-size: 22px; font-weight: 700; color: #e94560; }
.metric .label { font-size: 11px; color: #888; margin-top: 4px; }
.chart-container { background: #16213e; border-radius: 8px; padding: 8px; border: 1px solid #0f3460; margin-bottom: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
.status-ok { color: #00c853; }
.status-err { color: #ff5252; }
</style>
</head>
<body>

<header>
  <h1>MOEX Dashboard <span>v2</span></h1>
  <nav>
    <button class="tab active" data-tab="live">📊 Live</button>
    <button class="tab" data-tab="backtest">📈 Backtest</button>
    <button class="tab" data-tab="portfolio">🏆 Portfolio</button>
    <button class="tab" data-tab="data">📡 Data</button>
  </nav>
</header>

<main class="active">

<!-- ═══ Live ═══ -->
<section id="tab-live" class="tab-content active">
  <div class="controls">
    <label>Тикер:</label>
    <select id="live-ticker"></select>
    <label>ТФ:</label>
    <select id="live-tf">
      <option value="5m">5m</option>
      <option value="15m">15m</option>
      <option value="H1">H1</option>
      <option value="H4">H4</option>
    </select>
    <label>Дней:</label>
    <input type="number" id="live-days" value="5" min="1" max="365" style="width:60px">
    <button class="primary" onclick="loadLive()">🔄 Обновить</button>
  </div>
  <div class="row">
    <div class="col" style="flex:2">
      <div class="chart-container" id="live-chart" style="height:500px"></div>
    </div>
    <div class="col" style="flex:1">
      <div class="card">
        <h3>🟢 Активные позиции</h3>
        <div id="live-positions"><p style="color:#888;font-size:13px">Загрузка...</p></div>
      </div>
      <div class="card">
        <h3>⚡ Последние сигналы</h3>
        <div id="live-signals"><p style="color:#888;font-size:13px">Загрузка...</p></div>
      </div>
    </div>
  </div>
</section>

<!-- ═══ Backtest ═══ -->
<section id="tab-backtest" class="tab-content">
  <div class="controls">
    <label>Стратегия:</label>
    <select id="bt-strategy"></select>
    <label>Тикер:</label>
    <select id="bt-ticker"></select>
    <label>Дней:</label>
    <input type="number" id="bt-days" value="180" min="30" max="1000" style="width:70px">
    <button class="primary" onclick="runBacktest()">▶ Запустить</button>
  </div>
  <div class="grid-2">
    <div class="chart-container" id="bt-chart" style="height:350px"></div>
    <div class="card" id="bt-stats-card">
      <h3>📊 Результаты (OOS 30%)</h3>
      <div id="bt-stats"><p style="color:#888;font-size:13px">Запустите бэктест</p></div>
    </div>
  </div>
  <div class="card">
    <h3>📋 Сигналы (OOS)</h3>
    <div id="bt-signals"><p style="color:#888;font-size:13px">Нет данных</p></div>
  </div>
</section>

<!-- ═══ Portfolio ═══ -->
<section id="tab-portfolio" class="tab-content">
  <div class="controls">
    <button class="primary" onclick="loadPortfolio()">🔄 Обновить</button>
  </div>
  <div class="metrics" id="portfolio-metrics"></div>
  <div class="grid-2">
    <div class="chart-container" id="portfolio-equity-chart" style="height:350px"></div>
    <div class="chart-container" id="portfolio-donut" style="height:350px"></div>
  </div>
  <div class="card">
    <h3>📊 Стратегии</h3>
    <div id="portfolio-strategies"></div>
  </div>
</section>

<!-- ═══ Data ═══ -->
<section id="tab-data" class="tab-content">
  <div class="controls">
    <button class="primary" onclick="loadData()">🔄 Обновить</button>
  </div>
  <div class="grid-2">
    <div class="card">
      <h3>📡 Свежесть данных</h3>
      <div id="data-freshness"><p style="color:#888;font-size:13px">Загрузка...</p></div>
    </div>
    <div class="card">
      <h3>🔌 Статус БД</h3>
      <div id="data-dbstatus"><p style="color:#888;font-size:13px">Загрузка...</p></div>
    </div>
  </div>
  <div class="card">
    <h3>📋 Доступные стратегии</h3>
    <div id="data-strategies"></div>
  </div>
</section>

</main>

<script>
// ═══ Tab switching ═══
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ═══ Globals ═══
let allStrategies = [];

// ═══ Init: load strategies for selectors ═══
async function init() {
  try {
    const r = await fetch('/api/strategies');
    const d = await r.json();
    allStrategies = d.strategies || [];
    populateLiveTickers();
    populateBacktestStrategies();
    loadLive();
    loadData();
  } catch(e) {
    console.error('Init error:', e);
  }
}

// ═══ Live Tab ═══
function populateLiveTickers() {
  const sel = document.getElementById('live-ticker');
  const seen = new Set();
  allStrategies.forEach(s => {
    Object.keys(s.tickers || {}).forEach(t => {
      if (!seen.has(t)) { seen.add(t);
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = (s.tickers[t]?.label || t) + ' (' + t + ')';
        sel.appendChild(opt);
      }
    });
  });
}

async function loadLive() {
  const ticker = document.getElementById('live-ticker').value;
  const days = document.getElementById('live-days').value;
  if (!ticker) return;

  try {
    const [barsR, sigR, posR] = await Promise.all([
      fetch(`/api/bars?symbol=${ticker}&days=${days}`).then(r => r.json()),
      fetch('/api/live/signals').then(r => r.json()),
      fetch('/api/live/positions').then(r => r.json()),
    ]);

    renderLiveChart(ticker, barsR.bars || [], sigR.signals || []);
    renderLivePositions(posR.positions || []);
    renderLiveSignals(sigR.signals || []);
  } catch(e) {
    console.error('Live error:', e);
  }
}

function renderLiveChart(ticker, bars, signals) {
  const div = document.getElementById('live-chart');
  if (!bars.length) { div.innerHTML = '<p style="color:#888;padding:40px;text-align:center">Нет данных для ' + ticker + '</p>'; return; }

  const times = bars.map(b => b.time);
  const open = bars.map(b => b.open);
  const high = bars.map(b => b.high);
  const low = bars.map(b => b.low);
  const close = bars.map(b => b.close);
  const volume = bars.map(b => b.volume);

  const traceCandle = {
    x: times, open, high, low, close,
    type: 'candlestick',
    name: ticker,
    increasing: { line: { color: '#00c853' }, fillcolor: '#00c853' },
    decreasing: { line: { color: '#ff5252' }, fillcolor: '#ff5252' },
    xaxis: 'x', yaxis: 'y',
  };

  const traceVol = {
    x: times, y: volume,
    type: 'bar',
    name: 'Volume',
    marker: { color: '#0f3460', opacity: 0.6 },
    yaxis: 'y2',
  };

  const sigTimes = signals.filter(s => s.ticker === ticker).map(s => s.time);
  const sigPrices = signals.filter(s => s.ticker === ticker).map(s => s.entry);
  const sigDirs = signals.filter(s => s.ticker === ticker).map(s => s.direction);
  const sigColors = sigDirs.map(d => d === 'LONG' ? '#00c853' : '#ff5252');
  const sigSymbols = sigDirs.map(d => d === 'LONG' ? 'triangle-up' : 'triangle-down');

  const traceSignals = {
    x: sigTimes, y: sigPrices,
    type: 'scatter',
    mode: 'markers',
    name: 'Signals',
    marker: { size: 12, color: sigColors, symbol: sigSymbols, line: { width: 1, color: '#fff' } },
    yaxis: 'y',
  };

  const layout = {
    title: { text: ticker + ' — OHLCV + Сигналы', font: { color: '#e0e0e0', size: 14 } },
    paper_bgcolor: '#16213e',
    plot_bgcolor: '#1a1a2e',
    font: { color: '#888' },
    xaxis: { rangeslider: { visible: false }, gridcolor: '#0f3460', color: '#888' },
    yaxis: { domain: [0.3, 1], gridcolor: '#0f3460', color: '#888', title: 'Price' },
    yaxis2: { domain: [0, 0.25], gridcolor: '#0f3460', color: '#888', title: 'Vol' },
    dragmode: 'zoom',
    margin: { t: 40, r: 20, b: 40, l: 50 },
    showlegend: false,
  };

  Plotly.newPlot(div, [traceCandle, traceVol, traceSignals], layout, { responsive: true, displayModeBar: false });
}

function renderLivePositions(positions) {
  const div = document.getElementById('live-positions');
  if (!positions.length) { div.innerHTML = '<p style="color:#888;font-size:13px">Нет открытых позиций</p>'; return; }
  let html = '<table><tr><th>Тикер</th><th>Напр.</th><th>Вход</th><th>GO</th></tr>';
  positions.forEach(p => {
    const dirClass = p.direction === 'LONG' ? 'pos-long' : 'pos-short';
    html += `<tr><td>${p.symbol}</td><td class="${dirClass}">${p.direction}</td><td>${p.entry_price}</td><td>${p.contracts}</td></tr>`;
  });
  html += '</table>';
  div.innerHTML = html;
}

function renderLiveSignals(signals) {
  const div = document.getElementById('live-signals');
  if (!signals.length) { div.innerHTML = '<p style="color:#888;font-size:13px">Нет сигналов</p>'; return; }
  const top = signals.slice(0, 10);
  let html = '<table><tr><th>Время</th><th>Тикер</th><th>Напр.</th><th>Стратегия</th><th>Ret%</th></tr>';
  top.forEach(s => {
    const dirClass = s.direction === 'LONG' ? 'pos-long' : 'pos-short';
    html += `<tr><td style="font-size:11px">${s.time?.slice(11,19)||''}</td><td>${s.ticker||''}</td><td class="${dirClass}">${s.direction||''}</td><td>${s.strategy||''}</td><td>${(s.return_pct||0).toFixed(2)}</td></tr>`;
  });
  html += '</table>';
  div.innerHTML = html;
}

// ═══ Backtest Tab ═══
function populateBacktestStrategies() {
  const sel = document.getElementById('bt-strategy');
  allStrategies.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.name;
    opt.textContent = s.display_name;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', updateBTTickers);
  updateBTTickers();
}

function updateBTTickers() {
  const stratName = document.getElementById('bt-strategy').value;
  const strat = allStrategies.find(s => s.name === stratName);
  const sel = document.getElementById('bt-ticker');
  sel.innerHTML = '';
  if (!strat) return;
  Object.keys(strat.tickers || {}).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = (strat.tickers[t]?.label || t) + ' (' + t + ')';
    sel.appendChild(opt);
  });
}

async function runBacktest() {
  const strategy = document.getElementById('bt-strategy').value;
  const ticker = document.getElementById('bt-ticker').value;
  const days = document.getElementById('bt-days').value;

  const btn = document.querySelector('#tab-backtest .primary');
  btn.disabled = true;
  btn.textContent = '⏳ Загрузка...';

  try {
    const r = await fetch(`/api/backtest/run?strategy=${strategy}&ticker=${ticker}&days=${days}`);
    const d = await r.json();

    if (d.error) {
      document.getElementById('bt-chart').innerHTML = `<p style="color:#ff5252;padding:40px;text-align:center">${d.error}</p>`;
      document.getElementById('bt-stats').innerHTML = `<p style="color:#ff5252">${d.error}</p>`;
      return;
    }

    renderBTChart(d);
    renderBTStats(d);
    renderBTSignals(d);
  } catch(e) {
    console.error('BT error:', e);
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Запустить';
  }
}

function renderBTChart(data) {
  const div = document.getElementById('bt-chart');
  const equity = data.equity || [];
  if (!equity.length) { div.innerHTML = '<p style="color:#888;padding:40px;text-align:center">Нет сигналов</p>'; return; }

  const trace = {
    y: equity,
    type: 'scatter',
    mode: 'lines',
    name: data.ticker,
    line: { color: '#e94560', width: 2 },
  };

  const layout = {
    title: { text: `Equity Curve — ${data.strategy} / ${data.ticker} (OOS)`, font: { color: '#e0e0e0', size: 13 } },
    paper_bgcolor: '#16213e',
    plot_bgcolor: '#1a1a2e',
    font: { color: '#888' },
    xaxis: { gridcolor: '#0f3460', color: '#888' },
    yaxis: { gridcolor: '#0f3460', color: '#888', title: 'Cum Return %' },
    margin: { t: 40, r: 20, b: 40, l: 50 },
  };

  Plotly.newPlot(div, [trace], layout, { responsive: true, displayModeBar: false });
}

function renderBTStats(data) {
  const s = data.stats || {};
  const div = document.getElementById('bt-stats');
  div.innerHTML = `
    <table>
      <tr><td>Всего сигналов</td><td style="font-weight:700">${data.total_signals || 0}</td></tr>
      <tr><td>OOS сигналы</td><td style="font-weight:700">${data.oos_signals_count || 0}</td></tr>
      <tr><td>Win Rate</td><td style="font-weight:700;color:#00c853">${s.wr ?? 0}%</td></tr>
      <tr><td>Profit Factor</td><td style="font-weight:700">${s.pf ?? 0}</td></tr>
      <tr><td>Max DD</td><td style="font-weight:700;color:#ff5252">${s.dd ?? 0}%</td></tr>
      <tr><td>Avg Return</td><td style="font-weight:700">${s.avg_ret ?? 0}%</td></tr>
    </table>
    <p style="color:#888;font-size:11px;margin-top:8px">Конфиг: ${JSON.stringify(data.config || {})}</p>
  `;
}

function renderBTSignals(data) {
  const div = document.getElementById('bt-signals');
  const sigs = data.signals || [];
  if (!sigs.length) { div.innerHTML = '<p style="color:#888;font-size:13px">Нет OOS сигналов</p>'; return; }
  let html = '<table><tr><th>Время</th><th>Напр.</th><th>Entry</th><th>Exit</th><th>Ret%</th></tr>';
  sigs.slice(0, 50).forEach(s => {
    const dirClass = s.direction === 'LONG' ? 'pos-long' : 'pos-short';
    html += `<tr><td style="font-size:11px">${(s.time||'').slice(11,19)}</td><td class="${dirClass}">${s.direction}</td><td>${s.entry?.toFixed(2)}</td><td>${s.exit?.toFixed(2)}</td><td style="font-weight:${s.return_pct > 0 ? '700;color:#00c853' : '700;color:#ff5252'}">${(s.return_pct||0).toFixed(2)}</td></tr>`;
  });
  html += '</table>';
  if (sigs.length > 50) html += `<p style="color:#888;font-size:11px">... и ещё ${sigs.length - 50}</p>`;
  div.innerHTML = html;
}

// ═══ Portfolio Tab ═══
async function loadPortfolio() {
  try {
    const [statsR, equityR] = await Promise.all([
      fetch('/api/portfolio/stats').then(r => r.json()),
      fetch('/api/portfolio/equity').then(r => r.json()),
    ]);

    renderPortfolioMetrics(statsR);
    renderPortfolioCharts(equityR, statsR);
    renderPortfolioStrategies(statsR);
  } catch(e) {
    console.error('Portfolio error:', e);
  }
}

function renderPortfolioMetrics(data) {
  const div = document.getElementById('portfolio-metrics');
  const c = data.combined || {};
  const t = data.tracker || {};
  div.innerHTML = `
    <div class="metric"><div class="value">${c.n || 0}</div><div class="label">Сигналов всего</div></div>
    <div class="metric"><div class="value">${c.wr || 0}%</div><div class="label">Win Rate</div></div>
    <div class="metric"><div class="value">${typeof c.pf === 'number' ? (c.pf === Infinity ? '∞' : c.pf.toFixed(2)) : '0'}</div><div class="label">Profit Factor</div></div>
    <div class="metric"><div class="value" style="color:#ff5252">${c.dd || 0}%</div><div class="label">Max DD</div></div>
    <div class="metric"><div class="value">${t.total_trades || 0}</div><div class="label">Сделок (трекер)</div></div>
    <div class="metric"><div class="value">${t.total_pnl || 0} ₽</div><div class="label">PnL (трекер)</div></div>
    <div class="metric"><div class="value">${t.open_positions || 0}</div><div class="label">Открыто позиций</div></div>
  `;
}

function renderPortfolioCharts(equityData, statsData) {
  // Equity curves
  const eqDiv = document.getElementById('portfolio-equity-chart');
  const curves = equityData.curves || {};
  const traces = [];
  const colors = ['#e94560', '#00c853', '#2196f3', '#ff9800', '#9c27b0'];

  Object.keys(curves).forEach((name, i) => {
    const c = curves[name];
    if (c.equity?.length) {
      traces.push({
        y: c.equity,
        type: 'scatter', mode: 'lines',
        name: c.display_name,
        line: { color: colors[i % colors.length], width: 2 },
      });
    }
  });

  const layout = {
    title: { text: 'Equity Curves — Все стратегии', font: { color: '#e0e0e0', size: 13 } },
    paper_bgcolor: '#16213e', plot_bgcolor: '#1a1a2e',
    font: { color: '#888' },
    xaxis: { gridcolor: '#0f3460' },
    yaxis: { gridcolor: '#0f3460', title: 'Cum Return %' },
    margin: { t: 40, r: 20, b: 40, l: 50 },
    legend: { font: { color: '#e0e0e0', size: 10 }, orientation: 'h', y: -0.2 },
  };
  Plotly.newPlot(eqDiv, traces, layout, { responsive: true, displayModeBar: false });

  // Donut chart
  const donutDiv = document.getElementById('portfolio-donut');
  const stratData = statsData.strategies || {};
  const labels = [];
  const values = [];
  Object.keys(stratData).forEach(name => {
    labels.push(stratData[name].display_name);
    values.push(stratData[name].signal_count || 0);
  });

  const donutTrace = {
    labels, values,
    type: 'pie',
    hole: 0.4,
    marker: { colors: colors.slice(0, labels.length) },
    textinfo: 'label+percent',
    textfont: { color: '#e0e0e0', size: 10 },
  };
  const donutLayout = {
    title: { text: 'Распределение сигналов', font: { color: '#e0e0e0', size: 13 } },
    paper_bgcolor: '#16213e', plot_bgcolor: '#1a1a2e',
    font: { color: '#888' },
    margin: { t: 40, r: 20, b: 20, l: 20 },
    showlegend: false,
  };
  Plotly.newPlot(donutDiv, [donutTrace], donutLayout, { responsive: true, displayModeBar: false });
}

function renderPortfolioStrategies(data) {
  const div = document.getElementById('portfolio-strategies');
  const s = data.strategies || {};
  let html = '<table><tr><th>Стратегия</th><th>Сигналы</th><th>WR%</th><th>PF</th><th>DD%</th><th>Avg Ret%</th></tr>';
  Object.keys(s).forEach(name => {
    const st = s[name];
    const stats = st.stats || {};
    html += `<tr><td style="font-weight:600">${st.display_name}</td><td>${st.signal_count}</td><td>${stats.wr || 0}</td><td>${typeof stats.pf === 'number' ? (stats.pf === Infinity ? '∞' : stats.pf.toFixed(2)) : '0'}</td><td>${stats.dd || 0}</td><td>${stats.avg_ret || 0}</td></tr>`;
  });
  html += '</table>';
  div.innerHTML = html;
}

// ═══ Data Tab ═══
async function loadData() {
  try {
    const [freshR, stratR] = await Promise.all([
      fetch('/api/data/freshness').then(r => r.json()),
      fetch('/api/strategies').then(r => r.json()),
    ]);

    renderFreshness(freshR);
    renderDBStatus(freshR.db_status);
    renderDataStrategies(stratR.strategies || []);
  } catch(e) {
    console.error('Data error:', e);
  }
}

function renderFreshness(data) {
  const div = document.getElementById('data-freshness');
  const f = data.freshness || [];
  if (!f.length) { div.innerHTML = '<p style="color:#888;font-size:13px">Нет данных</p>'; return; }
  let html = '<table><tr><th>Тикер</th><th>Последний бар</th><th>Часов назад</th></tr>';
  f.forEach(r => {
    const color = r.hours_behind !== null && r.hours_behind > 24 ? 'color:#ff5252' : '';
    html += `<tr><td>${r.ticker}</td><td style="font-size:11px">${r.last_bar || '—'}</td><td style="${color}">${r.hours_behind !== null ? r.hours_behind + 'ч' : '—'}</td></tr>`;
  });
  html += '</table>';
  div.innerHTML = html;
}

function renderDBStatus(status) {
  const div = document.getElementById('data-dbstatus');
  if (!status) { div.innerHTML = '<p style="color:#888;font-size:13px">Нет данных</p>'; return; }
  const ok = status.connected;
  div.innerHTML = `
    <p>Статус: <span class="${ok ? 'status-ok' : 'status-err'}">${ok ? '✅ Подключено' : '❌ Ошибка'}</span></p>
    <p style="font-size:12px;color:#888;margin-top:8px">Хост: ${status.host || '—'}<br>БД: ${status.dbname || '—'}</p>
  `;
}

function renderDataStrategies(strategies) {
  const div = document.getElementById('data-strategies');
  if (!strategies.length) { div.innerHTML = '<p style="color:#888;font-size:13px">Нет стратегий</p>'; return; }
  let html = '<table><tr><th>Стратегия</th><th>Тикеры</th><th>OI</th><th>Описание</th></tr>';
  strategies.forEach(s => {
    html += `<tr><td style="font-weight:600">${s.display_name}</td><td>${Object.keys(s.tickers||{}).join(', ')}</td><td>${s.needs_oi ? '✅' : '—'}</td><td style="color:#888;font-size:11px">${s.description || ''}</td></tr>`;
  });
  html += '</table>';
  div.innerHTML = html;
}

init();
