<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Equity E6 Portfolio</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 20px; color: #00d2ff; }
  h2 { font-size: 18px; margin: 30px 0 15px; color: #a0a0c0; }
  .chart-box { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #0f3460; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: #16213e; border-radius: 8px; padding: 15px; border: 1px solid #0f3460; }
  .stat .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 22px; font-weight: bold; margin-top: 4px; }
  .value.green { color: #00e676; }
  .value.red { color: #ff5252; }
  .value.cyan { color: #00d2ff; }
  .value.orange { color: #ffab40; }
  canvas { width: 100% !important; height: 400px !important; }
</style>
</head>
<body>
<div class="container">
  <h1>📈 E6 Portfolio Equity (M15 · lot=50% · bars=4 · stop=1.0ATR)</h1>

  <div class="stats" id="stats"></div>

  <div class="chart-box">
    <h2>Portfolio Equity Curve</h2>
    <canvas id="equityChart"></canvas>
  </div>

  <div class="chart-box">
    <h2>Drawdown</h2>
    <canvas id="ddChart"></canvas>
  </div>
</div>

<script>
const equityData = null;

async function loadData() {
  const resp = await fetch('/reports/equity_e6.json');
  const data = await resp.json();

  const times = data.map(d => d.time.slice(0, 16));
  const equity = data.map(d => d.equity);

  const initial = 100000;
  const final = equity[equity.length - 1];
  const ret = ((final - initial) / initial * 100).toFixed(1);
  const peak = Math.max(...equity);
  const dd = Math.max(...equity.map((e, i) => (peak - Math.max(...equity.slice(0, i+1))) / Math.max(...equity.slice(0, i+1))));
  const cagr = (Math.pow(final / initial, 1 / (1.33)) - 1) * 100;
  const calmar = (ret / 100) / dd;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="label">Initial Capital</div><div class="value cyan">${initial.toLocaleString()} ₽</div></div>
    <div class="stat"><div class="label">Final Capital</div><div class="value green">${final.toLocaleString()} ₽</div></div>
    <div class="stat"><div class="label">Return</div><div class="value green">+${ret}%</div></div>
    <div class="stat"><div class="label">CAGR</div><div class="value green">${cagr.toFixed(1)}%</div></div>
    <div class="stat"><div class="label">Max DD</div><div class="value red">${(dd * 100).toFixed(1)}%</div></div>
    <div class="stat"><div class="label">Calmar</div><div class="value orange">${calmar.toFixed(1)}</div></div>
  `;

  const ddSeries = equity.map((e, i) => {
    const p = Math.max(...equity.slice(0, i+1));
    return (p - e) / p * 100;
  });

  new Chart(document.getElementById('equityChart'), {
    type: 'line',
    data: {
      labels: times,
      datasets: [{
        label: 'Portfolio Equity',
        data: equity.map(e => Math.round(e)),
        borderColor: '#00d2ff',
        backgroundColor: 'rgba(0, 210, 255, 0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#e0e0e0' } } },
      scales: {
        x: { ticks: { color: '#888', maxTicksLimit: 10 }, grid: { color: '#0f3460' } },
        y: { ticks: { color: '#888', callback: v => v.toLocaleString() + ' ₽' }, grid: { color: '#0f3460' } }
      }
    }
  });

  new Chart(document.getElementById('ddChart'), {
    type: 'line',
    data: {
      labels: times,
      datasets: [{
        label: 'Drawdown %',
        data: ddSeries.map(d => -d),
        borderColor: '#ff5252',
        backgroundColor: 'rgba(255, 82, 82, 0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#e0e0e0' } } },
      scales: {
        x: { ticks: { color: '#888', maxTicksLimit: 10 }, grid: { color: '#0f3460' } },
        y: { ticks: { color: '#888', callback: v => v + '%' }, grid: { color: '#0f3460' } }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
